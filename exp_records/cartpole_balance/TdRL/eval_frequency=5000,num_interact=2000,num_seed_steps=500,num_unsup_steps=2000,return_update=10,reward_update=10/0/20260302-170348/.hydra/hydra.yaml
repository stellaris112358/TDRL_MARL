hydra:
  run:
    dir: ./exp_records/${env}/${algorithm}/${hydra.job.override_dirname}/${seed}/${now:%Y%m%d-%H%M%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - env=cartpole_balance
    - seed=0
    - device=cuda
    - num_train_steps=20000
    - num_seed_steps=500
    - num_unsup_steps=2000
    - num_interact=2000
    - eval_frequency=5000
    - return_update=10
    - reward_update=10
  job:
    name: train_tdrl
    chdir: true
    override_dirname: eval_frequency=5000,num_interact=2000,num_seed_steps=500,num_unsup_steps=2000,return_update=10,reward_update=10
    id: ???
    num: ???
    config_name: tdrl
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys:
        - env
        - device
        - num_train_steps
        - seed
        - algorithm
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /media/asus/D盘/TDRL_MARL
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /media/asus/D盘/TDRL_MARL/conf
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /media/asus/D盘/TDRL_MARL/exp_records/cartpole_balance/TdRL/eval_frequency=5000,num_interact=2000,num_seed_steps=500,num_unsup_steps=2000,return_update=10,reward_update=10/0/20260302-170348
    choices:
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
